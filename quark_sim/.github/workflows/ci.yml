name: QuarkSim CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  format:
    name: Rustfmt
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check Formatting
        run: cargo fmt -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Physics Environment
        run: ./scripts/setup_all_wsl.sh
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Run Clippy
        run: bash -l -c "source scripts/apfelxx_env.sh && cargo clippy -- -D warnings"

  test_rust:
    name: Rust Unit Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Physics Environment
        run: ./scripts/setup_all_wsl.sh
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run Rust Tests
        run: bash -l -c "source scripts/apfelxx_env.sh && cargo test"

  test_python:
    name: Python Analysis Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install dependencies
        run: pip install -r analysis/requirements.txt
      - name: Run Pytest
        run: pytest analysis/tests/

  test_cpp:
    name: C++ Physics Engine Tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Physics Environment
        run: ./scripts/setup_all_wsl.sh
      - name: Run CTest
        run: |
          cd physics-engine/build
          ctest --output-on-failure
